apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blog-ingress
  namespace: blog
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - host: blog.local
    http:
      paths:
      - path: /api/v1/users
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 80
      - path: /api/v1/posts
        pathType: Prefix
        backend:
          service:
            name: post-service
            port:
              number: 80
      - path: /api/v1/comments
        pathType: Prefix
        backend:
          service:
            name: comment-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: post-service
            port:
              number: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: blog-config
  namespace: blog
data:
  APP_ENV: "production"
  LOG_LEVEL: "info"
  ENABLE_TRACING: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: blog-service-account
  namespace: blog
