name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_REGISTRY: docker.io/yourusername
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-user-service:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push user-service
      uses: docker/build-push-action@v4
      with:
        context: ./src/user-service
        push: true
        tags: ${{ env.DOCKER_REGISTRY }}/user-service:${{ env.IMAGE_TAG }}
        cache-from: type=registry,ref=${{ env.DOCKER_REGISTRY }}/user-service:buildcache
        cache-to: type=registry,ref=${{ env.DOCKER_REGISTRY }}/user-service:buildcache,mode=max

  build-post-service:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push post-service
      uses: docker/build-push-action@v4
      with:
        context: ./src/post-service
        push: true
        tags: ${{ env.DOCKER_REGISTRY }}/post-service:${{ env.IMAGE_TAG }}
        cache-from: type=registry,ref=${{ env.DOCKER_REGISTRY }}/post-service:buildcache
        cache-to: type=registry,ref=${{ env.DOCKER_REGISTRY }}/post-service:buildcache,mode=max

  deploy:
    needs: [build-user-service, build-post-service]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    
    - name: Install kubectl
      uses: azure/setup-kubectl@v3
    
    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
    
    - name: Deploy to Kubernetes
      env:
        DOCKER_REGISTRY: ${{ env.DOCKER_REGISTRY }}
        IMAGE_TAG: ${{ env.IMAGE_TAG }}
      run: |
        export DOCKER_REGISTRY=${{ env.DOCKER_REGISTRY }}
        export IMAGE_TAG=${{ env.IMAGE_TAG }}
        
        kubectl apply -f k8s/infrastructure.yaml
        envsubst < k8s/user-service.yaml | kubectl apply -f -
        envsubst < k8s/post-service.yaml | kubectl apply -f -
        kubectl apply -f k8s/ingress.yaml
    
    - name: Verify deployment
      run: |
        kubectl rollout status deployment/user-service -n blog
        kubectl rollout status deployment/post-service -n blog
